name: Update Third-Party Licenses

on:
  push:
    branches:
      - main
    paths:
      - 'Cargo.lock'
      - 'Cargo.toml'
      - 'about.toml'
  workflow_dispatch:

# Serialise runs per ref so two pushes cannot race to push the same branch.
concurrency:
  group: licenses-${{ github.ref }}
  cancel-in-progress: true

jobs:
  update-licenses:
    name: Update Licenses
    runs-on: ubuntu-latest
    # A dispatch can select a tag, not just a branch, and base below would then
    # resolve to that tag. create-pull-request requires a branch to merge into,
    # so a tag run cannot do anything useful. Skip rather than fail late.
    if: github.ref_type == 'branch'
    permissions:
      contents: write
      pull-requests: write

    steps:
      - uses: actions/checkout@v7

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Install cargo-about
        run: cargo install cargo-about --features cli --locked

      - name: Add Cargo bin to PATH
        run: echo "$HOME/.cargo/bin" >> $GITHUB_PATH

      - name: Generate Rust dependency licenses
        run: |
          cargo about generate about.hbs > RUST_LICENSES.txt

      - name: Combine all licenses
        run: |
          cat > THIRD_PARTY_LICENSES.txt << 'HEADER'
          ================================================================================
          THIRD-PARTY SOFTWARE LICENSES
          ================================================================================

          This software bundles third-party libraries. Their licenses are listed below.

          ================================================================================
          SECTION 1: RUST DEPENDENCIES
          ================================================================================

          HEADER

          cat RUST_LICENSES.txt >> THIRD_PARTY_LICENSES.txt

          cat >> THIRD_PARTY_LICENSES.txt << 'GPU_HEADER'

          ================================================================================
          SECTION 2: GPU LIBRARIES (included in CUDA builds only)
          ================================================================================

          The GPU builds include the following libraries:

          --------------------------------------------------------------------------------
          ONNX Runtime
          --------------------------------------------------------------------------------

          License: MIT License
          Copyright (c) Microsoft Corporation

          https://github.com/microsoft/onnxruntime

          Permission is hereby granted, free of charge, to any person obtaining a copy
          of this software and associated documentation files (the "Software"), to deal
          in the Software without restriction, including without limitation the rights
          to use, copy, modify, merge, publish, distribute, sublicense, and/or sell
          copies of the Software, and to permit persons to whom the Software is
          furnished to do so, subject to the following conditions:

          The above copyright notice and this permission notice shall be included in all
          copies or substantial portions of the Software.

          THE SOFTWARE IS PROVIDED "AS IS", WITHOUT WARRANTY OF ANY KIND, EXPRESS OR
          IMPLIED, INCLUDING BUT NOT LIMITED TO THE WARRANTIES OF MERCHANTABILITY,
          FITNESS FOR A PARTICULAR PURPOSE AND NONINFRINGEMENT. IN NO EVENT SHALL THE
          AUTHORS OR COPYRIGHT HOLDERS BE LIABLE FOR ANY CLAIM, DAMAGES OR OTHER
          LIABILITY, WHETHER IN AN ACTION OF CONTRACT, TORT OR OTHERWISE, ARISING FROM,
          OUT OF OR IN CONNECTION WITH THE SOFTWARE OR THE USE OR OTHER DEALINGS IN THE
          SOFTWARE.

          --------------------------------------------------------------------------------
          NVIDIA CUDA Toolkit Libraries
          --------------------------------------------------------------------------------

          License: NVIDIA CUDA Toolkit End User License Agreement
          https://docs.nvidia.com/cuda/eula/index.html

          Redistribution of the following CUDA libraries is permitted under Section 2.1
          of the NVIDIA CUDA Toolkit EULA:
          - CUDA Runtime (cudart)
          - cuBLAS
          - cuFFT
          - cuRAND

          Copyright (c) NVIDIA Corporation. All rights reserved.

          --------------------------------------------------------------------------------
          NVIDIA cuDNN
          --------------------------------------------------------------------------------

          License: NVIDIA cuDNN Software License Agreement
          https://docs.nvidia.com/deeplearning/cudnn/sla/index.html

          Redistribution is permitted under Section 2.1 of the cuDNN SLA when bundled
          with applications that use cuDNN.

          Copyright (c) NVIDIA Corporation. All rights reserved.

          GPU_HEADER

          rm RUST_LICENSES.txt

      - name: Check for changes
        id: check
        run: |
          if git diff --quiet THIRD_PARTY_LICENSES.txt; then
            echo "changed=false" >> $GITHUB_OUTPUT
          else
            echo "changed=true" >> $GITHUB_OUTPUT
          fi

      # GitHub does not run workflows on a pull request opened with GITHUB_TOKEN,
      # so Lint and Test never see this file, and the merge below is unattended.
      # That makes this step the only thing standing between a broken generator
      # and the base branch. Fail loudly rather than merge nonsense.
      - name: Validate generated licence file
        if: steps.check.outputs.changed == 'true'
        env:
          MIN_LINES: '1000'
        run: |
          set -euo pipefail
          lines=$(wc -l < THIRD_PARTY_LICENSES.txt)
          if [ "$lines" -lt "$MIN_LINES" ]; then
            echo "::error::THIRD_PARTY_LICENSES.txt has $lines lines, expected at least $MIN_LINES. cargo-about likely emitted a truncated file."
            exit 1
          fi
          # Keep this list in sync with the section headers written by the
          # "Combine all licenses" step above. A header added there but not here
          # is simply never checked.
          while IFS= read -r marker; do
            if ! grep -qF "$marker" THIRD_PARTY_LICENSES.txt; then
              echo "::error::THIRD_PARTY_LICENSES.txt is missing the section marker: $marker"
              exit 1
            fi
          done <<'MARKERS'
          THIRD-PARTY SOFTWARE LICENSES
          SECTION 1: RUST DEPENDENCIES
          SECTION 2: GPU LIBRARIES (included in CUDA builds only)
          MARKERS
          echo "licence file looks sane: $lines lines"

      - name: Create Pull Request
        id: cpr
        if: steps.check.outputs.changed == 'true'
        uses: peter-evans/create-pull-request@v8
        with:
          commit-message: "chore: update third-party licenses"
          title: "chore: update third-party licenses"
          body: |
            This PR updates the THIRD_PARTY_LICENSES.txt file with the latest
            license information from Rust dependencies.

            Auto-generated by the licenses workflow.
          # Base is whichever ref the run happened on: main for the push trigger
          # above, or the selected branch for a manual dispatch. Targeting the
          # dispatched branch is deliberate and is how PR #238 was produced.
          # Set explicitly because the action otherwise infers the base from the
          # checkout, which is silent and easy to misread.
          base: ${{ github.ref_name }}
          # One head branch per base. A shared head branch means every open PR
          # gets a notification each time the branch is force-pushed.
          branch: update-licenses/${{ github.ref_name }}
          delete-branch: true
          labels: dependencies

      # The file is generated from Cargo.lock and contains no code, so there is
      # nothing for a human to decide here. Merge outright rather than with
      # --auto: auto-merge only queues behind required checks, and this repo has
      # none, so enabling it on an already-mergeable PR just errors.
      #
      # This does not re-trigger the workflow. The merge only touches
      # THIRD_PARTY_LICENSES.txt, which is not in the paths filter above.
      - name: Merge the licence PR
        if: steps.check.outputs.changed == 'true' && steps.cpr.outputs.pull-request-number != ''
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          PR_NUMBER: ${{ steps.cpr.outputs.pull-request-number }}
          POLL_ATTEMPTS: '12'
          POLL_DELAY: '5'
        run: |
          set -euo pipefail

          # GitHub computes mergeability in a background job, so a PR queried
          # straight after creation reports UNKNOWN. Merging on UNKNOWN fails and
          # leaves the PR open, which is the exact state this step exists to
          # avoid, so wait for a real answer first.
          state=UNKNOWN
          for attempt in $(seq 1 "$POLL_ATTEMPTS"); do
            state=$(gh pr view "$PR_NUMBER" --json mergeStateStatus --jq .mergeStateStatus)
            if [ "$state" != "UNKNOWN" ]; then
              echo "mergeability resolved to $state after $attempt attempt(s)"
              break
            fi
            echo "mergeability still UNKNOWN, retrying in ${POLL_DELAY}s ($attempt/$POLL_ATTEMPTS)"
            sleep "$POLL_DELAY"
          done

          if [ "$state" = "UNKNOWN" ]; then
            echo "::error::mergeability never resolved for PR #$PR_NUMBER; leaving it open for review"
            exit 1
          fi

          # DIRTY means the base moved under us and the branch now conflicts.
          # Nothing here can resolve that, so fail rather than thrash.
          if [ "$state" = "DIRTY" ]; then
            echo "::error::PR #$PR_NUMBER conflicts with its base; leaving it open for review"
            exit 1
          fi

          gh pr merge "$PR_NUMBER" --squash --delete-branch
          echo "merged licence PR #$PR_NUMBER (state was $state)"
